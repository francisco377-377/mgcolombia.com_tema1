<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calibrador — Mundo Genético</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',sans-serif;
  background:#0f172a; color:#e2e8f0;
  display:flex; height:100vh; overflow:hidden;
}

/* ── IZQUIERDA: mapa ── */
#left {
  flex:1; overflow:auto;
  display:flex; align-items:flex-start; justify-content:center;
  background:#1e293b; padding:20px;
}

/* El wrapper es exactamente del tamaño de la imagen */
#img-wrap {
  position:relative;
  display:inline-block;
  cursor:crosshair;
  flex-shrink:0;
}
#img-wrap img {
  display:block;
  max-height:calc(100vh - 40px);
  width:auto;
  user-select:none;
  pointer-events:none; /* el clic lo captura el wrapper */
}

/* Pines — position absolute dentro del img-wrap */
.pin {
  position:absolute;
  width:12px; height:12px;
  border-radius:50%;
  background:#38bdf8;
  border:2px solid #fff;
  box-shadow:0 0 0 2px rgba(56,189,248,0.5);
  /* centrado en el punto exacto */
  transform:translate(-50%,-50%);
  cursor:move;
}
.pin.hq {
  width:15px; height:15px;
  background:#f5c842;
  box-shadow:0 0 8px rgba(245,200,66,0.9);
}
.pin .lbl {
  position:absolute;
  left:14px; top:-5px;
  font-size:9px; white-space:nowrap;
  background:rgba(0,0,0,0.8);
  color:#fff; padding:1px 4px;
  border-radius:3px;
  pointer-events:none;
}

/* Línea de mira */
#hair-h, #hair-v {
  position:absolute; pointer-events:none;
  background:rgba(248,200,66,0.5);
}
#hair-h { height:1px; left:0; right:0; }
#hair-v { width:1px; top:0; bottom:0; }

/* coords live */
#live-coords {
  position:absolute; bottom:6px; left:6px;
  background:rgba(0,0,0,0.7); color:#38bdf8;
  font-size:10px; font-family:monospace;
  padding:3px 7px; border-radius:4px;
  pointer-events:none;
}

/* ── DERECHA: sidebar ── */
#right {
  width:320px; flex-shrink:0;
  display:flex; flex-direction:column;
  background:#1e293b; border-left:1px solid #334155;
}
header {
  padding:12px 16px; background:#0f172a;
  border-bottom:1px solid #334155;
}
header h1 { font-size:0.95rem; font-weight:700; color:#38bdf8; }
header p  { font-size:0.7rem; color:#94a3b8; margin-top:3px; }

#prog-row {
  padding:8px 16px; background:#162032;
  border-bottom:1px solid #334155;
  display:flex; align-items:center; gap:8px;
}
#prog-bar-bg { flex:1; background:#334155; border-radius:99px; height:5px; }
#prog-bar    { height:100%; background:#38bdf8; border-radius:99px; width:0%; transition:width .3s; }
#prog-txt    { font-size:0.7rem; color:#94a3b8; white-space:nowrap; }

#cur-box {
  padding:10px 16px; border-bottom:1px solid #334155;
}
#cur-box small { font-size:0.65rem; text-transform:uppercase; letter-spacing:.8px; color:#64748b; }
#cur-name { font-size:1rem; font-weight:700; color:#fff; margin-top:2px; }
#cur-name.hq { color:#f5c842; }
#cur-hint { font-size:0.68rem; color:#94a3b8; margin-top:4px; line-height:1.5; }

#list { flex:1; overflow-y:auto; padding:4px 0; }
.row {
  display:flex; align-items:center; gap:6px;
  padding:4px 16px; font-size:0.75rem;
  cursor:pointer; border-radius:4px;
  margin:1px 6px;
}
.row:hover { background:#334155; }
.row.done    { color:#4ade80; }
.row.active  { background:#1d3a52; color:#38bdf8; font-weight:600; }
.row.pending { color:#64748b; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.row.done .dot    { background:#4ade80; }
.row.active .dot  { background:#38bdf8; }
.row.pending .dot { background:#334155; }
.xy { font-size:0.6rem; color:#4a5568; margin-left:auto; font-family:monospace; }

#btns {
  padding:10px 16px; border-top:1px solid #334155;
  display:flex; flex-direction:column; gap:6px;
}
.btn-row { display:flex; gap:6px; }
button {
  flex:1; padding:7px; border:none; border-radius:6px;
  font-size:0.75rem; font-weight:600; cursor:pointer;
}
#b-undo  { background:#334155; color:#e2e8f0; }
#b-skip  { background:#1e3a8a; color:#fff; }
#b-reset { background:#450a0a; color:#fca5a5; }
#b-copy  {
  background:#059669; color:#fff;
  font-size:0.8rem; padding:9px;
  margin-top:2px;
}
#b-copy:disabled { background:#334155; color:#64748b; cursor:not-allowed; }
#json-out {
  background:#0f172a; border:1px solid #334155;
  border-radius:5px; padding:6px;
  font-size:0.6rem; font-family:monospace;
  color:#86efac; white-space:pre-wrap;
  max-height:120px; overflow-y:auto;
  display:none; margin-top:4px;
}
#done-msg {
  display:none; padding:10px 16px;
  background:#052e16; border-top:2px solid #4ade80;
  text-align:center;
}
#done-msg h2 { color:#4ade80; font-size:0.9rem; }
#done-msg p  { font-size:0.68rem; color:#86efac; margin-top:2px; }
</style>
</head>
<body>

<!-- MAPA -->
<div id="left">
  <div id="img-wrap">
    <img id="mapa" src="assets/images/Mapa base limpio.webp" alt="Colombia">
    <div id="hair-h"></div>
    <div id="hair-v"></div>
    <div id="live-coords">x:— y:—</div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="right">
  <header>
    <h1>🗺️ Calibrador de Ciudades</h1>
    <p>Clic para colocar · Arrastra pin para mover</p>
  </header>
  
  <div style="padding: 10px 16px; border-bottom: 1px solid #334155;">
    <small style="font-size:0.65rem; color:#64748b; display:block; margin-bottom:5px;">IMPORTAR JSON (opcional)</small>
    <textarea id="json-input" placeholder="Pega aquí tu JSON anterior para corregir..." style="width:100%; height:60px; background:#0f172a; border:1px solid #334155; color:#38bdf8; font-size:0.6rem; padding:5px; border-radius:4px;"></textarea>
    <button onclick="importJSON()" style="width:100%; margin-top:5px; background:#1e3a8a; color:white; padding:5px; border-radius:4px; font-size:0.7rem;">Cargar JSON para corregir</button>
  </div>

  <div id="prog-row">
    <div id="prog-bar-bg"><div id="prog-bar"></div></div>
    <span id="prog-txt">0 / 38</span>
  </div>
  <div id="cur-box">
    <small>Ciudad activa</small>
    <div id="cur-name">Cargando…</div>
    <div id="cur-hint">Clic en el mapa → coloca el pin<br>Arrastra el pin ya colocado → reposiciona</div>
  </div>
  <div id="list"></div>
  <div id="btns">
    <div class="btn-row">
      <button id="b-undo"  onclick="undo()">↩ Deshacer</button>
      <button id="b-skip"  onclick="skip()">Saltar →</button>
      <button id="b-reset" onclick="resetAll()">🗑 Reset</button>
    </div>
    <button id="b-copy" onclick="copy()" disabled>📋 Copiar JSON</button>
    <div id="json-out"></div>
  </div>
  <div id="done-msg">
    <h2>✅ ¡Listo!</h2>
    <p>Pega el JSON al agente para colocar los edificios</p>
  </div>
</div>

<script>
const CITIES = [
  {name:"Medellín",              hq:true },
  {name:"Acacías",               hq:false},
  {name:"Apartadó",             hq:false},
  {name:"Arauca",                hq:false},
  {name:"Armenia",               hq:false},
  {name:"Barranquilla",         hq:false},
  {name:"Bogotá",                hq:false},
  {name:"Bucaramanga",          hq:false},
  {name:"Cajicá",               hq:false},
  {name:"Cali",                 hq:false},
  {name:"Cartagena",            hq:false},
  {name:"Caucasia",             hq:false},
  {name:"Cúcuta",               hq:false},
  {name:"Granada",              hq:false},
  {name:"Ibagué",               hq:false},
  {name:"Ipiales",              hq:false},
  {name:"Magangué",             hq:false},
  {name:"Manizales",            hq:false},
  {name:"Mocoa",                hq:false},
  {name:"Montelíbano",          hq:false},
  {name:"Montería",             hq:false},
  {name:"Monterrey (Casanare)", hq:false},
  {name:"Neiva",                hq:false},
  {name:"Palmira",              hq:false},
  {name:"Pasto",                hq:false},
  {name:"Pereira",              hq:false},
  {name:"Pitalito",             hq:false},
  {name:"Popayán",              hq:false},
  {name:"Quibdó",               hq:false},
  {name:"San Andrés",           hq:false},
  {name:"Sincelejo",            hq:false},
  {name:"Tocancipá",            hq:false},
  {name:"Tumaco",               hq:false},
  {name:"Tunja",                hq:false},
  {name:"Túquerres",            hq:false},
  {name:"Valledupar",           hq:false},
  {name:"Villavicencio",        hq:false},
  {name:"Yopal",                hq:false},
];

const wrap    = document.getElementById('img-wrap');
const mapa    = document.getElementById('mapa');
const hairH   = document.getElementById('hair-h');
const hairV   = document.getElementById('hair-v');
const liveXY  = document.getElementById('live-coords');

let cur = 0;
const placed = {};   // name → {left%, top%}
const els    = {};   // name → pin DOM element

// ── Porcentaje relativo al img-wrap ─────────────────────────────────────────
function pct(clientX, clientY) {
  const r = wrap.getBoundingClientRect();
  return {
    left: parseFloat(((clientX - r.left) / r.width  * 100).toFixed(2)),
    top:  parseFloat(((clientY - r.top)  / r.height * 100).toFixed(2)),
  };
}

// ── Crear / mover pin ────────────────────────────────────────────────────────
function setPin(name, left, top) {
  const city = CITIES.find(c => c.name === name);
  placed[name] = {left, top};

  let el = els[name];
  if (!el) {
    el = document.createElement('div');
    el.className = 'pin' + (city.hq ? ' hq' : '');
    el.innerHTML = `<span class="lbl">${name}</span>`;
    wrap.appendChild(el);
    els[name] = el;
    makeDraggable(el, name);
  }
  el.style.left = left + '%';
  el.style.top  = top  + '%';
}

// ── Arrastrar pin existente ──────────────────────────────────────────────────
function makeDraggable(el, name) {
  let dragging = false;

  el.addEventListener('mousedown', e => {
    e.stopPropagation();   // no dispara el clic del wrap
    dragging = true;
    el.style.opacity = '.6';
    e.preventDefault();

    function onMove(ev) {
      if (!dragging) return;
      const {left, top} = pct(ev.clientX, ev.clientY);
      const cLeft = Math.max(0, Math.min(100, left));
      const cTop  = Math.max(0, Math.min(100, top));
      el.style.left = cLeft + '%';
      el.style.top  = cTop  + '%';
      placed[name] = {left: cLeft, top: cTop};
      render();
    }
    function onUp() {
      dragging = false;
      el.style.opacity = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      render();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Clic en el wrap para colocar la ciudad activa ────────────────────────────
wrap.addEventListener('click', e => {
  if (cur >= CITIES.length) return;
  // Si el clic fue EN un pin existente, no hacer nada
  if (e.target.closest?.('.pin')) return;

  const {left, top} = pct(e.clientX, e.clientY);
  setPin(CITIES[cur].name, left, top);

  // Avanzar al siguiente sin colocar
  const next = CITIES.findIndex((c, i) => i > cur && !placed[c.name]);
  cur = next === -1 ? CITIES.length : next;
  render();
});

// ── Línea de mira y coords en vivo ──────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;
  hairH.style.top  = y + 'px';
  hairV.style.left = x + 'px';
  const p = pct(e.clientX, e.clientY);
  liveXY.textContent = `x:${p.left.toFixed(1)}%  y:${p.top.toFixed(1)}%`;
});

// ── Render sidebar ───────────────────────────────────────────────────────────
function render() {
  const city = CITIES[cur];
  const nm   = document.getElementById('cur-name');
  nm.textContent = city ? (city.hq ? '⭐ ' + city.name + ' — SEDE PRINCIPAL' : city.name) : '✅ Todas las ciudades marcadas';
  nm.className   = (city?.hq) ? 'hq' : '';

  const done  = Object.keys(placed).length;
  const total = CITIES.length;
  document.getElementById('prog-bar').style.width = (done/total*100) + '%';
  document.getElementById('prog-txt').textContent = done + ' / ' + total;

  const list = document.getElementById('list');
  list.innerHTML = '';
  CITIES.forEach((c, i) => {
    const isDone = !!placed[c.name];
    const isCur  = i === cur;
    const div = document.createElement('div');
    div.className = 'row ' + (isDone ? 'done' : isCur ? 'active' : 'pending');
    const xy = isDone ? `${placed[c.name].left},${placed[c.name].top}` : '';
    div.innerHTML = `<span class="dot"></span><span>${c.hq?'⭐ ':''}${c.name}</span>${isDone?`<span class="xy">${xy}</span>`:''}`;
    div.onclick = () => { cur = i; render(); };
    list.appendChild(div);
    if (isCur) div.scrollIntoView({block:'nearest'});
  });

  const allDone = done === total;
  document.getElementById('b-copy').disabled = !allDone;
  if (allDone) {
    document.getElementById('done-msg').style.display = 'block';
    exportJSON(false);
  }
}

// ── Controles ────────────────────────────────────────────────────────────────
function undo() {
  const keys = Object.keys(placed);
  if (!keys.length) return;
  const last = keys[keys.length-1];
  delete placed[last];
  if (els[last]) { els[last].remove(); delete els[last]; }
  cur = CITIES.findIndex(c => c.name === last);
  render();
}
function skip() {
  if (cur < CITIES.length-1) { cur++; render(); }
}
function resetAll() {
  if (!confirm('¿Borrar todo?')) return;
  Object.values(els).forEach(e => e.remove());
  Object.keys(placed).forEach(k => delete placed[k]);
  Object.keys(els).forEach(k => delete els[k]);
  cur = 0;
  document.getElementById('done-msg').style.display = 'none';
  render();
}

function exportJSON(autoCopy = true) {
  const data = CITIES.filter(c => placed[c.name])
    .map(c => ({name:c.name, hq:c.hq, left:placed[c.name].left, top:placed[c.name].top}));
  const json = JSON.stringify(data, null, 2);
  const out  = document.getElementById('json-out');
  out.textContent = json; out.style.display = 'block';
  if (autoCopy) navigator.clipboard.writeText(json).then(() => {
    const b = document.getElementById('b-copy');
    b.textContent = '✅ ¡Copiado!';
    setTimeout(() => b.textContent = '📋 Copiar JSON', 2000);
  });
}
function importJSON() {
  const input = document.getElementById('json-input').value;
  if (!input) return alert('Por favor pega el JSON primero');
  try {
    const data = JSON.parse(input);
    // Limpiar actuales
    Object.values(els).forEach(e => e.remove());
    Object.keys(placed).forEach(k => delete placed[k]);
    Object.keys(els).forEach(k => delete els[k]);
    
    data.forEach(item => {
      setPin(item.name, item.left, item.top);
    });
    // Apuntar a la siguiente pendiente o al final
    const next = CITIES.findIndex((c, i) => !placed[c.name]);
    cur = next === -1 ? CITIES.length : next;
    render();
    alert('JSON cargado. Ahora puedes arrastrar los pines para ajustarlos.');
  } catch(e) {
    alert('Error al leer el JSON: ' + e.message);
  }
}

render();
</script>
</body>
</html>
