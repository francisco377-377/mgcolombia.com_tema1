<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calibrador de Ciudades — Mundo Genético</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; gap: 0; height: 100vh; overflow: hidden; }

  /* MAP PANEL */
  #map-panel { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #1e293b; }
  #map-img { max-width: 100%; max-height: 100vh; display: block; cursor: crosshair; user-select: none; }
  .placed-pin { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #38bdf8; border: 2px solid #fff; transform: translate(-50%, -50%); pointer-events: none; }
  .placed-pin.hq { background: #f5c842; box-shadow: 0 0 8px #f5c842; }
  .placed-pin .pin-label { position: absolute; left: 14px; top: -4px; font-size: 9px; white-space: nowrap; background: rgba(0,0,0,0.75); padding: 1px 4px; border-radius: 3px; color: #fff; }
  #crosshair { position: absolute; pointer-events: none; display: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(248,196,66,0.6); }
  #crosshair::before { width: 1px; height: 20px; top: -10px; left: 0; }
  #crosshair::after { width: 20px; height: 1px; top: 0; left: -10px; }

  /* SIDEBAR */
  #sidebar { width: 340px; display: flex; flex-direction: column; background: #1e293b; border-left: 1px solid #334155; overflow: hidden; }

  #sidebar header { padding: 1rem 1.2rem; background: #0f172a; border-bottom: 1px solid #334155; }
  #sidebar header h1 { font-size: 1rem; font-weight: 700; color: #38bdf8; }
  #sidebar header p { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }

  #progress { padding: 0.75rem 1.2rem; background: #162032; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 0.8rem; }
  #progress-bar-wrap { flex: 1; background: #334155; border-radius: 99px; height: 6px; }
  #progress-bar { height: 100%; background: #38bdf8; border-radius: 99px; transition: width 0.3s; }
  #progress-text { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; }

  #current-city { padding: 1rem 1.2rem; border-bottom: 1px solid #334155; }
  #current-city p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 0.3rem; }
  #current-city-name { font-size: 1.1rem; font-weight: 700; color: #fff; }
  #current-city-name.hq { color: #f5c842; }
  .hint { font-size: 0.72rem; color: #94a3b8; margin-top: 0.4rem; }

  #city-list-scroll { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
  .city-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1.2rem; font-size: 0.8rem; cursor: pointer; border-radius: 4px; margin: 1px 0.5rem; transition: background 0.15s; }
  .city-row:hover { background: #334155; }
  .city-row.done { color: #4ade80; }
  .city-row.current { background: #1d3a52; color: #38bdf8; font-weight: 600; }
  .city-row.pending { color: #64748b; }
  .city-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .city-row.done .dot { background: #4ade80; }
  .city-row.current .dot { background: #38bdf8; }
  .city-row.pending .dot { background: #334155; }
  .city-row .coords-small { font-size: 0.65rem; color: #64748b; margin-left: auto; }

  #actions { padding: 0.8rem 1.2rem; border-top: 1px solid #334155; display: flex; flex-direction: column; gap: 0.5rem; }
  button { padding: 0.5rem 0.8rem; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  #btn-undo { background: #334155; color: #e2e8f0; }
  #btn-skip { background: #1e40af; color: #fff; }
  #btn-export { background: #059669; color: #fff; font-size: 0.85rem; padding: 0.6rem; margin-top: 0.3rem; }
  #btn-export:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  #json-output { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 0.6rem; font-size: 0.65rem; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow-y: auto; color: #86efac; display: none; margin-top: 0.5rem; }

  #done-banner { display: none; padding: 1rem 1.2rem; background: #052e16; border-top: 2px solid #4ade80; text-align: center; }
  #done-banner h2 { color: #4ade80; font-size: 1rem; margin-bottom: 0.3rem; }
  #done-banner p { font-size: 0.72rem; color: #86efac; }
</style>
</head>
<body>

<!-- MAP -->
<div id="map-panel">
  <img id="map-img" src="assets/images/mapa_cobertura_colombia.png" alt="Mapa Colombia" draggable="false">
  <div id="crosshair"></div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <header>
    <h1>🗺️ Calibrador de Ciudades</h1>
    <p>Haz clic en el mapa para marcar cada ciudad</p>
  </header>

  <div id="progress">
    <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <span id="progress-text">0 / 38</span>
  </div>

  <div id="current-city">
    <p>Ciudad actual</p>
    <div id="current-city-name">Cargando...</div>
    <div class="hint">← Haz clic en el mapa donde está esta ciudad</div>
  </div>

  <div id="city-list-scroll"></div>

  <div id="actions">
    <div style="display:flex;gap:0.5rem">
      <button id="btn-undo" onclick="undoLast()">↩ Deshacer</button>
      <button id="btn-skip" onclick="skipCity()">Saltar →</button>
    </div>
    <button id="btn-export" onclick="exportJSON()" disabled>📋 Copiar JSON de coordenadas</button>
    <div id="json-output"></div>
  </div>

  <div id="done-banner">
    <h2>✅ ¡Calibración completa!</h2>
    <p>Copia el JSON y envíalo al agente para colocar los edificios</p>
  </div>
</div>

<script>
const CITIES = [
  { name: "Medellín",            hq: true  },
  { name: "Acacías",             hq: false },
  { name: "Apartadó",           hq: false },
  { name: "Arauca",              hq: false },
  { name: "Armenia",             hq: false },
  { name: "Barranquilla",       hq: false },
  { name: "Bogotá",              hq: false },
  { name: "Bucaramanga",        hq: false },
  { name: "Cajicá",             hq: false },
  { name: "Cali",               hq: false },
  { name: "Cartagena",          hq: false },
  { name: "Caucasia",           hq: false },
  { name: "Cúcuta",             hq: false },
  { name: "Granada",            hq: false },
  { name: "Ibagué",             hq: false },
  { name: "Ipiales",            hq: false },
  { name: "Magangué",           hq: false },
  { name: "Manizales",          hq: false },
  { name: "Mocoa",              hq: false },
  { name: "Montelíbano",        hq: false },
  { name: "Montería",           hq: false },
  { name: "Monterrey (Casanare)", hq: false },
  { name: "Neiva",              hq: false },
  { name: "Palmira",            hq: false },
  { name: "Pasto",              hq: false },
  { name: "Pereira",            hq: false },
  { name: "Pitalito",           hq: false },
  { name: "Popayán",            hq: false },
  { name: "Quibdó",             hq: false },
  { name: "San Andrés",         hq: false },
  { name: "Sincelejo",          hq: false },
  { name: "Tocancipá",          hq: false },
  { name: "Tumaco",             hq: false },
  { name: "Tunja",              hq: false },
  { name: "Túquerres",          hq: false },
  { name: "Valledupar",         hq: false },
  { name: "Villavicencio",      hq: false },
  { name: "Yopal",              hq: false },
];

let current = 0;
const placed = {}; // name → {left, top}
const pins = [];   // DOM elements

const mapPanel = document.getElementById('map-panel');
const mapImg   = document.getElementById('map-img');
const crosshair = document.getElementById('crosshair');

function updateUI() {
  // Current city
  const city = CITIES[current];
  if (city) {
    const el = document.getElementById('current-city-name');
    el.textContent = city.hq ? ('⭐ ' + city.name + ' — SEDE PRINCIPAL') : city.name;
    el.className = city.hq ? 'hq' : '';
  }
  // Progress
  const done = Object.keys(placed).length;
  const total = CITIES.length;
  document.getElementById('progress-bar').style.width = (done/total*100) + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total;
  // List
  const list = document.getElementById('city-list-scroll');
  list.innerHTML = '';
  CITIES.forEach((c, i) => {
    const row = document.createElement('div');
    const isDone = placed[c.name] !== undefined;
    const isCurrent = i === current;
    row.className = 'city-row ' + (isDone ? 'done' : isCurrent ? 'current' : 'pending');
    const coordsText = isDone ? (placed[c.name].left + '%, ' + placed[c.name].top + '%') : '';
    row.innerHTML = `<span class="dot"></span><span>${c.hq ? '⭐ ' : ''}${c.name}</span>${isDone ? '<span class="coords-small">' + coordsText + '</span>' : ''}`;
    row.onclick = () => { current = i; updateUI(); };
    list.appendChild(row);
    if (isCurrent) row.scrollIntoView({ block:'nearest' });
  });
  // Export button
  const allDone = Object.keys(placed).length === CITIES.length;
  document.getElementById('btn-export').disabled = !allDone;
  if (allDone) {
    document.getElementById('done-banner').style.display = 'block';
    exportJSON();
  }
}

// Click on map
mapImg.addEventListener('click', e => {
  if (current >= CITIES.length) return;
  const rect = mapImg.getBoundingClientRect();
  const left = ((e.clientX - rect.left) / rect.width * 100).toFixed(2);
  const top  = ((e.clientY - rect.top)  / rect.height * 100).toFixed(2);
  const city = CITIES[current];
  placed[city.name] = { left: parseFloat(left), top: parseFloat(top) };

  // Draw pin on map
  const pin = document.createElement('div');
  pin.className = 'placed-pin' + (city.hq ? ' hq' : '');
  pin.style.left = left + '%';
  pin.style.top  = top  + '%';
  pin.innerHTML  = `<span class="pin-label">${city.name}</span>`;
  mapPanel.appendChild(pin);
  pins.push({ el: pin, name: city.name });

  current = CITIES.findIndex((c, i) => i > current && !placed[c.name]);
  if (current === -1) current = CITIES.length;
  updateUI();
});

// Crosshair follow cursor
mapPanel.addEventListener('mousemove', e => {
  const rect = mapImg.getBoundingClientRect();
  if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
    crosshair.style.display = 'none'; return;
  }
  crosshair.style.display = 'block';
  crosshair.style.left = (e.clientX - rect.left) + 'px';
  crosshair.style.top  = (e.clientY - rect.top)  + 'px';
});
mapPanel.addEventListener('mouseleave', () => crosshair.style.display = 'none');

function undoLast() {
  const keys = Object.keys(placed);
  if (!keys.length) return;
  const last = keys[keys.length - 1];
  delete placed[last];
  const pin = pins.pop();
  if (pin) pin.el.remove();
  current = CITIES.findIndex(c => c.name === last);
  updateUI();
}

function skipCity() {
  if (current >= CITIES.length - 1) return;
  current++;
  updateUI();
}

function exportJSON() {
  const result = CITIES.map(c => ({
    name: c.name,
    hq: c.hq,
    left: placed[c.name]?.left ?? null,
    top:  placed[c.name]?.top  ?? null
  })).filter(c => c.left !== null);

  const json = JSON.stringify(result, null, 2);
  const out = document.getElementById('json-output');
  out.textContent = json;
  out.style.display = 'block';
  navigator.clipboard.writeText(json).then(() => {
    document.getElementById('btn-export').textContent = '✅ ¡Copiado al clipboard!';
    setTimeout(() => document.getElementById('btn-export').textContent = '📋 Copiar JSON de coordenadas', 2500);
  });
}

updateUI();
</script>
</body>
</html>
