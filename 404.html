<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | 404 | Mundo Genético</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon-ad.svg">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .error-404-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            padding: 4rem 2rem;
        }
        .error-container {
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, var(--primary-blue), var(--primary-blue-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.15;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .error-content {
            position: relative;
            z-index: 1;
        }
        .error-title {
            font-size: 2.5rem;
            color: var(--primary-blue-dark);
            margin-bottom: 1.5rem;
        }
        .error-text {
            font-size: 1.15rem;
            color: #64748b;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .dna-icon-404 {
            font-size: 4rem;
            color: var(--primary-blue);
            margin-bottom: 2rem;
            animation: floatDNA 4s infinite ease-in-out;
        }
        @keyframes floatDNA {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>

<body class="theme-light-medical">

    <!-- Header Simplicado para 404 -->
    <header class="main-header">
        <div class="header-top">
            <div class="container d-flex align-center" style="height: 100%; position: relative;">
                <div class="logo">
                    <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: white;">
                        <i class="fa-solid fa-dna logo-icon text-white" style="font-size: 1.8rem; margin-right: 0.5rem;"></i>
                        <div class="logo-text text-white">
                            <span style="display: block; font-weight: 700;">Mundo</span>
                            <span style="display: block; font-size: 0.9rem; opacity: 0.9;">Genético</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="error-404-section">
            <div class="error-code">404</div>
            <div class="error-container error-content">
                <i class="fa-solid fa-dna dna-icon-404"></i>
                <h1 class="error-title">Vaya, parece que te has perdido...</h1>
                <p class="error-text">
                    La página que buscas no existe o ha sido movida. 
                    No te preocupes, la genética nos enseña que siempre hay un camino de vuelta a la base.
                </p>
                <div class="d-flex justify-center gap-3">
                    <a href="index.html" class="btn-primary-modern">
                        <i class="fa-solid fa-house mr-2"></i> Volver al Inicio
                    </a>
                    <a href="contactenos/" class="btn-secondary-modern">
                        <i class="fa-solid fa-headset mr-2"></i> Asesoría Directa
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer" style="padding: 2rem 0; background: var(--primary-blue-dark); color: white; text-align: center;">
        <div class="container">
            <p>&copy; 2026 Mundo Genético. Todos los derechos protegidos.</p>
        </div>
    </footer>

</body>
</html>
